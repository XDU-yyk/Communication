<text x="79" y="635" font-family="Noto Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif" font-size="25" font-weight="700" fill="#243142" text-anchor="start">结果摘要</text>
<text x="85" y="672" font-family="Noto Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#344054" text-anchor="start">场景：静态 OLSR 基线；节点规模：地面站 1 个 + 无人机 30 架；无线通信范围：2000 米。</text>
<text x="85" y="706" font-family="Noto Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#344054" text-anchor="start">总体结果：发送应用包 10 个，接收应用包 10 个，总体投递率 100.0%，平均时延 10.5 毫秒。</text>
<text x="85" y="740" font-family="Noto Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#344054" text-anchor="start">信道活动：物理层总发送 1,092,364 字节，包含 OLSR 路由控制开销和应用数据。</text>
<text x="85" y="774" font-family="Noto Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#344054" text-anchor="start">路由现象：路由日志中可看到多跳路径，最大跳数约 5 跳，说明 OLSR 在该静态链式场景下已形成转发路径。</text>
<text x="85" y="808" font-family="Noto Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#344054" text-anchor="start">注意：这是第一版跑通结果，不是最终性能结论；目前总应用包数较少，平均/最大时延字段还需要用原始 FlowMonitor 再核对。</text>
